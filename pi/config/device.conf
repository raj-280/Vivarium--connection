# =============================================================================
# pi/config/device.conf  —  LOCAL DEV PLACEHOLDER ONLY
#
# !! THIS FILE IS NOT READ BY settings.py !!
# settings.py reads from /etc/vivarium/device.conf (system path).
# This file exists only as a local dev reminder of the config shape.
#
# On the real Pi:
#   - provisioner.py writes the real config to /etc/vivarium/device.conf
#   - settings.py reads from /etc/vivarium/device.conf
#   - This file is ignored by git (see .gitignore)
#
# For local dev/testing without a real Pi:
#   sudo mkdir -p /etc/vivarium
#   sudo cp pi/device.conf.example /etc/vivarium/device.conf
#   sudo chown $USER /etc/vivarium/device.conf
#   # then fill in real values
# =============================================================================

[identity]
device_id = rack-test
cpu_serial =

[server]
server_host = http://localhost:8000
presign_api_key =
mqtt_password =
rtsp_password =

[mqtt]
broker_host = localhost
broker_port = 1883
mqtt_use_tls = false
ca_cert_path =

[serial]
serial_port = auto
serial_baud = 115200
serial_timeout_s = 10.0
serial_retry_count = 1

[capture]
capture_dir = ./captures
batch_upload_enabled = false
tmp_is_tmpfs = false

[streaming]
mediamtx_port = 8554
stream_name = rack-test

[scan]
scan_lock_keepalive_interval_s = 30
