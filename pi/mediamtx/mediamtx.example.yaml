# =============================================================================
# Vivarium Gantry System — MediaMTX configuration template (Section 5.1/5.6/8)
# =============================================================================
#
# This is a TEMPLATE. pi/setup.sh and pi/provisioner.py substitute the
# placeholders below and write the live config to:
#
#     pi/mediamtx/mediamtx.yaml   (mode 600, read by vivarium-camera.service)
#
# ── Version lock ──────────────────────────────────────────────────────────────
# This template is written for a SPECIFIC MediaMTX release.  setup.sh reads
# the marker below and aborts if it does not match MEDIAMTX_VERSION in setup.sh.
# When upgrading MediaMTX:
#   1. Check the MediaMTX changelog for YAML-breaking changes.
#   2. Update this file to match the new schema.
#   3. Bump the marker below to the new version.
#   4. Bump MEDIAMTX_VERSION in setup.sh to the same value.
#   5. Test on a real Pi before rolling out.
#
# mediamtx_version_compat: v1.9.3
#
# ── Placeholders ─────────────────────────────────────────────────────────────
#   {{DEVICE_ID}}       — this Pi's device_id (e.g. rack-001)
#   {{MEDIAMTX_PORT}}   — from device.conf [streaming] mediamtx_port (default 8554)
#
#   NOTE: {{RTSP_PASSWORD}} is generated by provisioner.py and stored in
#   device.conf but is NOT used in this template — no authentication is
#   configured for testing.  The stream is LAN-only; UFW on the Pi restricts
#   ports 8554/8889 to the server subnet.
#
# ── MediaMTX v1.9.3 compatibility notes ──────────────────────────────────────
# This config targets MediaMTX v1.9.3 specifically.
#   - In v1.9.3, "api" is a FLAT BOOL and the address is a separate top-level
#     key "apiAddress". The struct form (api: {address: ...}) was added in a
#     LATER version and causes a YAML parse error on v1.9.3. Use the two flat
#     keys: "api: yes" and "apiAddress: ..." (as shown in this file).
#   - "http:" top-level key does NOT exist in v1.x. Use "hls:" for HLS.
#   - "rpicamera://" source prefix was pre-v1.0. Use "source: rpiCamera" in v1.x.
# =============================================================================

# ── Path definitions ──────────────────────────────────────────────────────────
# Each "path" is a named stream. The path name MUST equal device_id so the
# server can build the correct RTSP/WebRTC URL. (Section 8)
paths:
  "{{DEVICE_ID}}":
    # Pi Camera Module (CSI) — native libcamera source.
    # v1.x keyword: "rpiCamera" (not "rpicamera://")
    source: rpiCamera
    sourceOnDemand: true     # open camera only while someone is watching

    # No readUser/readPass — the browser connects via WHEP directly on the LAN
    # and cannot supply HTTP credentials. WebRTC/WHEP is LAN-only anyway;
    # UFW on the Pi restricts port 8889 to the server subnet.
    # RTSP (port 8554) is also LAN-only; UFW restricts it to the server IP
    # so no RTSP auth is needed at the MediaMTX level either.

    # ── Camera Module 3 (autofocus hardware) ─────────────────────────────
    rpiCameraWidth: 1920
    rpiCameraHeight: 1080
    rpiCameraFPS: 30
    rpiCameraCodec: hardwareH264
    rpiCameraBitrate: 4000000   # 4 Mbps — good quality for 1080p30
    rpiCameraAfMode: continuous  # continuous hardware autofocus
    rpiCameraAfSpeed: normal
    rpiCameraAfRange: normal     # normal = close to infinity

# ── RTSP server ───────────────────────────────────────────────────────────────
# Listen on all interfaces so the server can pull from the Pi's LAN IP.
# [PROD ONLY] UFW on the Pi restricts this port to the server IP only.
rtspAddress: ":{{MEDIAMTX_PORT}}"

# ── WebRTC (WHEP) ─────────────────────────────────────────────────────────────
# The browser connects to the server's /camera/{device_id}/whep endpoint which
# is reverse-proxied to this Pi's MediaMTX WebRTC port.
# [PROD ONLY] set iceHostNAT1To1IPs to your Pi's LAN IP for direct ICE.
webrtcAddress: ":8889"

# ── HLS / MJPEG ───────────────────────────────────────────────────────────────
# HLS/MJPEG fallback.
# NOTE: MediaMTX v1.x uses "hls:" (bool) + "hlsAddress:" for the listen port.
# There is NO "http:" top-level key in v1.x — that field causes "unknown field" error.
hls: yes
hlsAddress: ":8888"

# ── API (health check) ────────────────────────────────────────────────────────
# mediamtx_health.py calls GET http://localhost:9997/v3/paths/list
#
# NOTE: In MediaMTX v1.9.3, "api" is a FLAT BOOL and the listen address is a
# separate top-level key "apiAddress".  The struct form (api: {address: ...})
# was introduced in a later version and BREAKS v1.9.3 with a YAML parse error.
# The correct form for v1.9.3 is the two flat keys below.
# If you ever upgrade past v1.9.3, check the changelog — the struct form may
# be required in the newer version.
api: yes
apiAddress: "127.0.0.1:9997"  # localhost only — never exposed externally

# ── Logging ───────────────────────────────────────────────────────────────────
logLevel: info
logDestinations: [stdout]    # systemd captures stdout → journalctl

# =============================================================================
# Local testing (no real Pi / no real camera)
# =============================================================================
#
# Replace source: rpiCamera with a test pattern:
#
#   paths:
#     rack-test:
#       source: "ffmpeg:source=testsrc=size=640x480:rate=15#video=h264"
#
# Requires ffmpeg on PATH.
# View stream:
#   vlc rtsp://rack-test:{RTSP_PASSWORD}@localhost:8554/rack-test
#   curl http://localhost:8888/rack-test/index.m3u8
#   curl http://localhost:9997/v3/paths/list
# =============================================================================
