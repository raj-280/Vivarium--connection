# =============================================================================
# Vivarium Gantry System — Mosquitto configuration (LOCAL DEVELOPMENT)
# =============================================================================
# Section 9, Layer 2B — "Local dev" settings only.
# Every [PROD ONLY] item from the plan exists here as a commented block so the
# production hardening pass (Stage 15) is purely a config edit, not a rewrite.
# =============================================================================

# ---------------------------------------------------------------------------
# Listener
# ---------------------------------------------------------------------------
# Local dev: plain MQTT on 1883, bound to all interfaces so the Pi (or a
# socat virtual serial port test) can reach the server from the same machine.
listener 1883

# [PROD ONLY] TLS listener — uncomment and fill paths when TLS_ENABLED=true.
# Disabling port 1883 entirely (by removing the listener above) is also part
# of the production hardening pass.
#
# listener 8883
# cafile   /etc/mosquitto/certs/ca.crt
# certfile /etc/mosquitto/certs/server.crt
# keyfile  /etc/mosquitto/certs/server.key
# tls_version tlsv1.2

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
# Local dev: anonymous access allowed so mosquitto_pub/sub work without creds.
allow_anonymous true

# [PROD ONLY] Disable anonymous and enable mosquitto-go-auth (dynamic ACL
# backed by the same PostgreSQL DB as users/racks):
#
# allow_anonymous false
# auth_plugin /usr/lib/mosquitto_go_auth.so
# auth_opt_backends postgres
# auth_opt_pg_host       localhost
# auth_opt_pg_port       5432
# auth_opt_pg_dbname     vivarium
# auth_opt_pg_user       mosquitto
# auth_opt_pg_password   <from secrets manager>
# auth_opt_pg_userquery  SELECT password_hash FROM users WHERE username=$1 LIMIT 1
# auth_opt_pg_aclquery   SELECT topic FROM mqtt_acl WHERE username=$1 AND rw>=$2 LIMIT 1

# ---------------------------------------------------------------------------
# Persistence
# ---------------------------------------------------------------------------
# Keep messages across broker restarts (needed for QoS 1 motion commands and
# QoS 2 emergency stops that were queued while a Pi was offline).
# persistence true
# persistence_location /var/lib/mosquitto/

# Windows dev override — use a local relative path if the default doesn't exist.
# Uncomment this block and comment out the two lines above when running on Windows:
#
persistence true
persistence_location ./mosquitto_data/

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
# Log to stdout so a terminal session shows all connect/disconnect/publish
# events during development.
log_dest stdout
log_type all

# [PROD ONLY] Add file logging alongside stdout in production:
# log_dest file /var/log/mosquitto/mosquitto.log
# log_timestamp true

# ---------------------------------------------------------------------------
# QoS / Message limits
# ---------------------------------------------------------------------------
# Maximum in-flight QoS 1/2 messages per client.  Default (20) is fine for
# local dev; raise in production if many Pis share a window.
max_inflight_messages 20

# Maximum queued messages for offline (persistent-session) clients.
# Covers commands queued while a Pi is rebooting.
max_queued_messages 100

# ---------------------------------------------------------------------------
# [PROD ONLY] Per-client rate limiting
# ---------------------------------------------------------------------------
# In production these are enforced via iptables connlimit (10 connections/IP
# on port 8883) AND mosquitto-go-auth's rate-limit hook (60 msg/min per
# client, tracked in the cache backend).  No equivalent setting here for
# local dev — the server-side rate_limit.py middleware still applies.

# ---------------------------------------------------------------------------
# [PROD ONLY] Network binding
# ---------------------------------------------------------------------------
# In production the broker binds to the internal interface only:
# bind_address <internal-LAN-IP>
# The local-dev listener above intentionally omits bind_address so it accepts
# connections from localhost and any VM/container on the same machine.

# ---------------------------------------------------------------------------
# [PROD ONLY] Ansible inventory path (referenced by ANSIBLE_INVENTORY_PATH
# in server/.env — not a Mosquitto setting, kept here as a reminder comment
# for the Stage 15 operator).
# Regenerate ACL entries for all Pis and reload without dropping connections:
# ansible-playbook -i $ANSIBLE_INVENTORY_PATH playbooks/mosquitto_acl.yml
# ---------------------------------------------------------------------------
